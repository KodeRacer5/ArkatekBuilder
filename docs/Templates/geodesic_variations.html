<style>
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; padding: 12px; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.label { font-size: 12px; color: var(--color-text-secondary); text-align: center; font-family: var(--font-sans); }
</style>
<div class="grid">
  <div class="cell"><canvas id="g1" width="180" height="180"></canvas><div class="label">Original — clean arcs</div></div>
  <div class="cell"><canvas id="g2" width="180" height="180"></canvas><div class="label">Icosahedron subdivided</div></div>
  <div class="cell"><canvas id="g3" width="180" height="180"></canvas><div class="label">Denser grid + glow nodes</div></div>
  <div class="cell"><canvas id="g4" width="180" height="180"></canvas><div class="label">Pulse — nodes light up</div></div>
  <div class="cell"><canvas id="g5" width="180" height="180"></canvas><div class="label">Sparse — minimal lines</div></div>
  <div class="cell"><canvas id="g6" width="180" height="180"></canvas><div class="label">Two-layer nested</div></div>
</div>
<script>
const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const lc = dark ? 'rgba(255,255,255,' : 'rgba(30,30,30,';
let rot = 0, time = 0;

function project(x, y, z, tX, tY) {
  const y2 = y * Math.cos(tX) - z * Math.sin(tX);
  const z2 = y * Math.sin(tX) + z * Math.cos(tX);
  const x3 = x * Math.cos(tY) + z2 * Math.sin(tY);
  const z3 = -x * Math.sin(tY) + z2 * Math.cos(tY);
  const fov = 340;
  const s = fov / (fov + z3 * 0.35);
  return { px: x3 * s, py: y2 * s, z: z3, s };
}

function makeVerts(R, latStep, lonStep) {
  const v = [];
  for (let lat = -80; lat <= 80; lat += latStep)
    for (let lon = 0; lon < 360; lon += lonStep) {
      const phi = (90 - lat) * Math.PI / 180;
      const theta = lon * Math.PI / 180;
      v.push({ x: R*Math.sin(phi)*Math.cos(theta), y: R*Math.sin(phi)*Math.sin(theta), z: R*Math.cos(phi) });
    }
  return v;
}

function drawGeo(ctx, verts, R, tX, tY, cx, cy, threshold, nodeSize, edgeAlpha, nodeAlpha) {
  for (let i = 0; i < verts.length; i++) {
    for (let j = i+1; j < verts.length; j++) {
      const dx=verts[i].x-verts[j].x, dy=verts[i].y-verts[j].y, dz=verts[i].z-verts[j].z;
      if (dx*dx+dy*dy+dz*dz < threshold*threshold) {
        const pa = project(verts[i].x, verts[i].y, verts[i].z, tX, tY);
        const pb = project(verts[j].x, verts[j].y, verts[j].z, tX, tY);
        const a = edgeAlpha * (0.3 + (Math.max(pa.z,pb.z)/R+1)*0.5);
        ctx.beginPath();
        ctx.moveTo(cx+pa.px, cy+pa.py);
        ctx.lineTo(cx+pb.px, cy+pb.py);
        ctx.strokeStyle = lc+a+')'; ctx.lineWidth = 0.5; ctx.stroke();
      }
    }
  }
  verts.forEach(v => {
    const p = project(v.x, v.y, v.z, tX, tY);
    const a = nodeAlpha * (0.2 + (p.z/R+1)*0.55);
    ctx.beginPath();
    ctx.arc(cx+p.px, cy+p.py, nodeSize*(0.7+p.z/R*0.5), 0, Math.PI*2);
    ctx.fillStyle = lc+a+')'; ctx.fill();
  });
}

function g1Draw(canvas, rot) {
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,180,180);
  const verts = makeVerts(68, 20, 30);
  drawGeo(ctx, verts, 68, 0.45, rot*0.6, 90, 90, 68*0.75, 1.5, 0.6, 0.7);
}

function g2Draw(canvas, rot) {
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,180,180);
  const R = 68, tX = 0.45, tY = rot*0.5, cx = 90, cy = 90;
  const phi = (1+Math.sqrt(5))/2;
  const base = [[0,1,phi],[0,-1,phi],[0,1,-phi],[0,-1,-phi],[1,phi,0],[-1,phi,0],[1,-phi,0],[-1,-phi,0],[phi,0,1],[-phi,0,1],[phi,0,-1],[-phi,0,-1]];
  const scale = R / Math.sqrt(1+phi*phi);
  const verts = base.map(([x,y,z]) => {
    const n = Math.sqrt(x*x+y*y+z*z);
    return { x: x/n*R, y: y/n*R, z: z/n*R };
  });
  const subdivided = [];
  for (let i=0; i<verts.length; i++)
    for (let j=i+1; j<verts.length; j++) {
      const mid = { x:(verts[i].x+verts[j].x)/2, y:(verts[i].y+verts[j].y)/2, z:(verts[i].z+verts[j].z)/2 };
      const n = Math.sqrt(mid.x*mid.x+mid.y*mid.y+mid.z*mid.z);
      if (n > 0) subdivided.push({ x:mid.x/n*R, y:mid.y/n*R, z:mid.z/n*R });
    }
  const all = [...verts, ...subdivided];
  drawGeo(ctx, all, R, tX, tY, cx, cy, R*0.85, 1.2, 0.55, 0.8);
}

function g3Draw(canvas, rot) {
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,180,180);
  const verts = makeVerts(68, 15, 20);
  const R=68, tX=0.5, tY=rot*0.55, cx=90, cy=90;
  drawGeo(ctx, verts, R, tX, tY, cx, cy, R*0.7, 2.0, 0.5, 0.9);
}

function g4Draw(canvas, rot) {
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,180,180);
  const verts = makeVerts(68, 20, 30);
  const R=68, tX=0.45, tY=rot*0.6, cx=90, cy=90;
  for (let i=0; i<verts.length; i++) {
    for (let j=i+1; j<verts.length; j++) {
      const dx=verts[i].x-verts[j].x, dy=verts[i].y-verts[j].y, dz=verts[i].z-verts[j].z;
      if (dx*dx+dy*dy+dz*dz < (R*0.75)*(R*0.75)) {
        const pa=project(verts[i].x,verts[i].y,verts[i].z,tX,tY);
        const pb=project(verts[j].x,verts[j].y,verts[j].z,tX,tY);
        const a=0.35*(0.3+(Math.max(pa.z,pb.z)/R+1)*0.5);
        ctx.beginPath(); ctx.moveTo(cx+pa.px,cy+pa.py); ctx.lineTo(cx+pb.px,cy+pb.py);
        ctx.strokeStyle=lc+a+')'; ctx.lineWidth=0.5; ctx.stroke();
      }
    }
  }
  verts.forEach((v,idx) => {
    const p=project(v.x,v.y,v.z,tX,tY);
    const pulse = 0.5 + 0.5*Math.sin(time*2 + idx*0.8);
    const a = 0.15 + pulse*0.7*(0.3+(p.z/R+1)*0.4);
    const size = 1.0 + pulse*2.5*(0.5+p.z/R*0.5);
    ctx.beginPath(); ctx.arc(cx+p.px,cy+p.py,size,0,Math.PI*2);
    ctx.fillStyle=lc+a+')'; ctx.fill();
  });
}

function g5Draw(canvas, rot) {
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,180,180);
  const R=68, tX=0.45, tY=rot*0.5, cx=90, cy=90;
  const verts = makeVerts(R, 30, 45);
  for (let i=0; i<verts.length; i++) {
    for (let j=i+1; j<verts.length; j++) {
      const dx=verts[i].x-verts[j].x, dy=verts[i].y-verts[j].y, dz=verts[i].z-verts[j].z;
      if (dx*dx+dy*dy+dz*dz < (R*1.1)*(R*1.1)) {
        const pa=project(verts[i].x,verts[i].y,verts[i].z,tX,tY);
        const pb=project(verts[j].x,verts[j].y,verts[j].z,tX,tY);
        const a=0.45*(0.25+(Math.max(pa.z,pb.z)/R+1)*0.5);
        ctx.beginPath(); ctx.moveTo(cx+pa.px,cy+pa.py); ctx.lineTo(cx+pb.px,cy+pb.py);
        ctx.strokeStyle=lc+a+')'; ctx.lineWidth=0.7; ctx.stroke();
      }
    }
  }
  verts.forEach(v => {
    const p=project(v.x,v.y,v.z,tX,tY);
    const a=0.5+(p.z/R+1)*0.35;
    ctx.beginPath(); ctx.arc(cx+p.px,cy+p.py,2.2*(0.6+p.z/R*0.5),0,Math.PI*2);
    ctx.fillStyle=lc+a+')'; ctx.fill();
  });
}

function g6Draw(canvas, rot) {
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,180,180);
  const cx=90, cy=90;
  [68, 42].forEach((R, layer) => {
    const tX = 0.45 + layer*0.2;
    const tY = rot*(layer===0 ? 0.6 : -0.4);
    const verts = makeVerts(R, layer===0?20:25, layer===0?30:40);
    const thresh = R * (layer===0 ? 0.75 : 0.85);
    for (let i=0; i<verts.length; i++) {
      for (let j=i+1; j<verts.length; j++) {
        const dx=verts[i].x-verts[j].x, dy=verts[i].y-verts[j].y, dz=verts[i].z-verts[j].z;
        if (dx*dx+dy*dy+dz*dz < thresh*thresh) {
          const pa=project(verts[i].x,verts[i].y,verts[i].z,tX,tY);
          const pb=project(verts[j].x,verts[j].y,verts[j].z,tX,tY);
          const a=(layer===0?0.4:0.65)*(0.3+(Math.max(pa.z,pb.z)/R+1)*0.45);
          ctx.beginPath(); ctx.moveTo(cx+pa.px,cy+pa.py); ctx.lineTo(cx+pb.px,cy+pb.py);
          ctx.strokeStyle=lc+a+')'; ctx.lineWidth=layer===0?0.45:0.7; ctx.stroke();
        }
      }
    }
    verts.forEach(v => {
      const p=project(v.x,v.y,v.z,tX,tY);
      const a=(layer===0?0.5:0.85)*(0.3+(p.z/R+1)*0.45);
      ctx.beginPath(); ctx.arc(cx+p.px,cy+p.py,(layer===0?1.2:1.8)*(0.6+p.z/R*0.5),0,Math.PI*2);
      ctx.fillStyle=lc+a+')'; ctx.fill();
    });
  });
}

const all = [
  [document.getElementById('g1'), g1Draw],
  [document.getElementById('g2'), g2Draw],
  [document.getElementById('g3'), g3Draw],
  [document.getElementById('g4'), g4Draw],
  [document.getElementById('g5'), g5Draw],
  [document.getElementById('g6'), g6Draw],
];

function loop() {
  rot += 0.006; time += 0.04;
  all.forEach(([c,fn]) => fn(c, rot));
  requestAnimationFrame(loop);
}
loop();
</script>
